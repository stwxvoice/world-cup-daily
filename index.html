<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 世界杯 · 今日赛况日报</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0b;
    --paper: #f1efea;
    --paper-tint: #e8e5de;
    --ink-tint: #18181a;
    --accent: #c8102e;
    --accent-light: #e8543e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ── WebGL canvas layers ── */
  #bg-dark, #bg-light {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  #bg-dark { opacity: 0; }
  #bg-light { opacity: 1; }

  /* ── Hero ── */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 4rem 2rem;
    background: transparent;
  }
  .hero-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    color: #f0efea;
    letter-spacing: 0.04em;
    line-height: 1.2;
    text-shadow: 0 2px 24px rgba(0,0,0,0.08);
    data-anim: hero;
  }
  .hero-sub {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 400;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    color: var(--ink-tint);
    margin-top: 1.2rem;
    letter-spacing: 0.08em;
    data-anim: hero;
  }
  .hero-cta {
    margin-top: 2.5rem;
    data-anim: hero;
  }
  .hero-cta a {
    display: inline-block;
    padding: 0.85rem 2.4rem;
    background: rgba(200,16,46,0.85);
    color: #f0efea;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.06em;
    text-decoration: none;
    border-radius: 4px;
    transition: background 0.25s, transform 0.2s;
    backdrop-filter: blur(6px);
  }
  .hero-cta a:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(200,16,46,0.4);
  }

  /* ── Archive list ── */
  .archive-section {
    position: relative;
    z-index: 1;
    background: var(--paper);
    padding: 4rem 2rem 6rem;
  }
  .section-heading {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    color: var(--ink);
    text-align: center;
    margin-bottom: 3rem;
    letter-spacing: 0.04em;
  }
  .archive-list {
    max-width: 720px;
    margin: 0 auto;
    list-style: none;
  }
  .archive-item {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--paper-tint);
    transition: background 0.2s;
    data-anim: cascade;
  }
  .archive-item:hover {
    background: var(--paper-tint);
  }
  .archive-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92rem;
    color: var(--accent);
    white-space: nowrap;
    min-width: 140px;
  }
  .archive-desc {
    font-size: 1.05rem;
    color: var(--ink-tint);
  }
  .archive-desc a {
    color: var(--ink);
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, color 0.2s;
  }
  .archive-desc a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Footer ── */
  .site-footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2.5rem 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: rgba(10,10,11,0.45);
    background: var(--paper-tint);
    letter-spacing: 0.04em;
  }

  /* ── Motion One helpers ── */
  .motion-ready [data-anim="hero"] {
    opacity: 0;
    transform: translateY(32px);
  }
  .motion-ready [data-anim="cascade"] {
    opacity: 0;
    transform: translateY(28px);
  }
</style>
</head>
<body>

<!-- WebGL Background Canvases -->
<canvas id="bg-dark"></canvas>
<canvas id="bg-light"></canvas>

<!-- Hero Section -->
<section class="hero">
  <h1 class="hero-title">2026 世界杯 · 今日赛况日报</h1>
  <p class="hero-sub">FIFA World Cup Daily — 2026年7月 · 小组赛阶段</p>
  <div class="hero-cta">
    <a href="#archive">浏览往期日报 ↓</a>
  </div>
</section>

<!-- Archive List -->
<section class="archive-section" id="archive">
  <h2 class="section-heading">日报归档</h2>
  <ul class="archive-list">
    <li class="archive-item">
      <span class="archive-date">2026-07-03 · 小组赛第1轮</span>
      <span class="archive-desc"><a href="2026-07-03.html">6场比赛 · 西班牙3-0奥地利 / 葡萄牙点球晋级</a></span>
    </li>
  </ul>
</section>

<footer class="site-footer">
  Guizang Electronic Magazine × FIFA World Cup 2026 Daily &nbsp;·&nbsp; Powered by GitHub Pages
</footer>

<!-- Motion One -->
<script src="./motion.min.js"></script>
<script>
(function(){
  // ── WebGL Background (from Guizang template) ──
  const VS = `
    attribute vec2 a_pos;
    void main(){
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  const FS_DARK = `
    precision highp float;
    uniform float u_time;
    uniform vec2 u_res;

    // Holographic chromatic dispersion
    vec3 holo(vec2 uv, float t) {
      vec3 col = vec3(0.0);
      for (int i = 0; i < 3; i++) {
        float shift = float(i) * 0.004 - 0.004;
        vec2 uu = uv + vec2(sin(t * 0.3 + uv.y * 6.0 + shift * 40.0) * 0.015, 0.0);
        float n = sin(uu.x * 12.0 + t * 0.7) * sin(uu.y * 8.0 - t * 0.5);
        col[i] = 0.12 + 0.10 * n;
      }
      // Ink-wash base
      float grad = smoothstep(0.0, 1.0, uv.y);
      vec3 base = mix(vec3(0.04, 0.04, 0.05), vec3(0.08, 0.07, 0.09), grad);
      // Subtle red accent (Guizang accent)
      vec3 accent = vec3(0.78, 0.06, 0.18) * 0.04 * sin(uv.x * 10.0 + t * 0.4);
      return base + col + accent;
    }

    void main(){
      vec2 uv = gl_FragCoord.xy / u_res;
      gl_FragColor = vec4(holo(uv, u_time), 1.0);
    }
  `;

  const FS_LIGHT = `
    precision highp float;
    uniform float u_time;
    uniform vec2 u_res;

    // Spiral vortex
    vec3 vortex(vec2 uv, float t) {
      vec2 p = (uv - 0.5) * 2.0;
      float a = atan(p.y, p.x);
      float r = length(p);
      float spiral = sin(r * 8.0 - a * 3.0 + t * 0.6) * 0.5 + 0.5;
      float n = sin(uv.x * 14.0 + t * 0.5) * sin(uv.y * 10.0 - t * 0.3);
      vec3 col = mix(
        vec3(0.94, 0.92, 0.88),
        vec3(0.88, 0.85, 0.80),
        spiral * 0.3 + n * 0.1
      );
      // Subtle ink lines
      float lines = sin(r * 20.0 - a * 5.0 + t * 0.3);
      col -= 0.03 * smoothstep(0.0, 0.1, abs(lines));
      return col;
    }

    void main(){
      vec2 uv = gl_FragCoord.xy / u_res;
      gl_FragColor = vec4(vortex(uv, u_time), 1.0);
    }
  `;

  function bootGL(canvasId, fsSrc) {
    const canvas = document.getElementById(canvasId);
    const gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
    if (!gl) return null;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', resize);

    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VS);
    gl.compileShader(vs);

    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, fsSrc);
    gl.compileShader(fs);

    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const aPos = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    let raf = null;
    let start = performance.now();

    function draw() {
      const t = (performance.now() - start) * 0.001;
      gl.uniform1f(uTime, t);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      raf = requestAnimationFrame(draw);
    }

    return {
      start() { if (!raf) draw(); },
      stop() { if (raf) { cancelAnimationFrame(raf); raf = null; } },
      canvas
    };
  }

  const darkGL = bootGL('bg-dark', FS_DARK);
  const lightGL = bootGL('bg-light', FS_LIGHT);

  // Low-power mode detection
  let lowPower = false;
  if ('connection' in navigator) {
    lowPower = navigator.connection.saveData || (navigator.connection.effectiveType && navigator.connection.effectiveType === 'slow-2g');
  }

  // Start appropriate background
  function startGL() {
    if (lowPower) {
      if (lightGL) lightGL.canvas.style.opacity = '1';
      if (darkGL) darkGL.canvas.style.opacity = '0';
      return;
    }
    const isDark = document.body.classList.contains('dark-mode');
    if (isDark) {
      if (darkGL) { darkGL.canvas.style.opacity = '1'; darkGL.start(); }
      if (lightGL) { lightGL.canvas.style.opacity = '0'; lightGL.stop(); }
    } else {
      if (lightGL) { lightGL.canvas.style.opacity = '1'; lightGL.start(); }
      if (darkGL) { darkGL.canvas.style.opacity = '0'; darkGL.stop(); }
    }
  }

  startGL();

  // Mouse tracking for interactive shaders
  document.addEventListener('mousemove', function(e) {
    // Subtle parallax on hero text
    const hero = document.querySelector('.hero');
    if (!hero) return;
    const rect = hero.getBoundingClientRect();
    if (rect.bottom < 0) return;
    const x = (e.clientX / window.innerWidth - 0.5) * 8;
    const y = (e.clientY / window.innerHeight - 0.5) * 4;
    hero.style.transform = 'translate(' + x + 'px,' + y + 'px)';
  });

  // ── Motion One Animations ──
  function initMotion() {
    if (typeof Motion === 'undefined') return;

    // Hero elements: staggered fade-up
    const heroEls = document.querySelectorAll('[data-anim="hero"]');
    if (heroEls.length > 0) {
      Motion.stagger(heroEls, {
        animate: [
          { opacity: [0, 1], transform: ['translateY(32px)', 'translateY(0px)'] }
        ],
        duration: 800,
        delay: Motion.stagger(180),
        easing: 'ease-out'
      }, { scope: document });
    }

    // Cascade: scroll-triggered fade-up
    const cascadeEls = document.querySelectorAll('[data-anim="cascade"]');
    cascadeEls.forEach(function(el) {
      Motion.animate(el, {
        animate: [
          { opacity: [0, 1], transform: ['translateY(28px)', 'translateY(0px)'] }
        ],
        duration: 600,
        easing: 'ease-out',
        scroll: { target: el, threshold: 0.15 }
      }, { scope: document });
    });

    document.body.classList.add('motion-ready');
  }

  // Load motion.min.js if not already loaded
  if (typeof Motion !== 'undefined') {
    initMotion();
  } else {
    var s = document.createElement('script');
    s.src = './motion.min.js';
    s.onload = initMotion;
    document.head.appendChild(s);
  }
})();
</script>
</body>
</html>
